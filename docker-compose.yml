name: homebox-mcp

services:
  homebox-mcp:
    image: ${HOMEBOX_MCP_IMAGE:-homebox-mcp:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      HOMEBOX_MCP_HOST: 0.0.0.0
      HOMEBOX_MCP_PORT: ${HOMEBOX_MCP_PORT:-3000}
      HOMEBOX_MCP_PATH: ${HOMEBOX_MCP_PATH:-/mcp}
    ports:
      - "${HOMEBOX_MCP_PUBLISH_PORT:-3000}:${HOMEBOX_MCP_PORT:-3000}"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:' + (process.env.HOMEBOX_MCP_PORT || 3000) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
